<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cara o Cruz</title>
    <link rel="stylesheet" href="style/estilo.css">
    <script type="text/javascript" src="Javascript/javascriptHandgame.js"></script>
</head>
<body>
    <div class="page">
        <nav id="navbar" class="navbar">
            <div class="logo">
                <a href="home.html">
                    <img class="centered-image" src="media/arcade/logo.png" alt="Logo HANDgame">
                </a>
                <h1>HANDgame</h1>
            </div>
        </nav>

        <section class="panel info-block">
            <h2>Cara o Cruz</h2>
            <p>Elige cara o cruz y lanza la moneda.</p>
        </section>

        <section class="panel">
            <div class="actions">
                <button class="choice-button" style="background-image: url('media/caraocruz/cara.png');" type="button" value="cara" onclick="CaraCruz(value)" aria-label="Elegir Cara"></button>
                <button class="choice-button" style="background-image: url('media/caraocruz/cruz.png');" type="button" value="cruz" onclick="CaraCruz(value)" aria-label="Elegir Cruz"></button>
            </div>
        </section>

        <div class="home-cta">
            <a class="home-button" href="home.html">Volver al home</a>
        </div>
    </div>
</body>
</html>
