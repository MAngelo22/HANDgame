<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANDgame</title>
    <link rel="stylesheet" href="style/estilo.css">
</head>
<body>
    <div class="page">
        <nav id="navbar" aria-label="Principal">
            <div class="logo">
                <a href="home.html">
                    <img class="centered-image" src="media/arcade/logo.png" alt="Logo HANDgame">
                </a>
                <h1>Bienvenido a HANDgame</h1>
            </div>
        </nav>

        <section class="panel info-block">
            <h2>Disfrutaras de los juegos clasicos</h2>
            <p>Elige el juego que quieras iniciar.</p>
        </section>

        <div class="container">
            <fieldset>
                <legend>Elegir juego</legend>
                <div class="game-grid">
                    <a class="game-card" href="piedra1.html">
                        <img src="media/fondosBtn/ppt.jpg" alt="Piedra Papel o Tijera">
                        <span>Piedra Papel Tijera</span>
                    </a>
                    <a class="game-card" href="piedra2.html">
                        <img src="media/fondosBtn/OIG2.jpeg" alt="Piedra Papel Tijera Lagarto Spock">
                        <span>PPT Lagarto Spock</span>
                    </a>
                    <a class="game-card" href="21cartas.html">
                        <img src="media/fondosBtn/21.jpeg" alt="BlackJack 21">
                        <span>BlackJack</span>
                    </a>
                    <a class="game-card" href="caracruz.html">
                        <img src="media/fondosBtn/cara.jpeg" alt="Cara o Cruz">
                        <span>Cara o Cruz</span>
                    </a>
                    <a class="game-card" href="Vaqueros.html">
                        <img src="media/fondosBtn/psitol.jpeg" alt="Pistolero">
                        <span>Pistolero</span>
                    </a>
                    <a class="game-card" href="Monkey.html">
                        <img src="media/fondosBtn/mi.jpeg" alt="Monkey Island">
                        <span>Monkey Island</span>
                    </a>
                </div>
                <div class="home-cta">
                    <a class="home-button" href="https://manl-os.netlify.app/" target="_self">Ir a MANL-OS</a>
                </div>
            </fieldset>
        </div>
    </div>
</body>
</html>
