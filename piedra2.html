<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra Papel Tijera Lagarto Spock</title>
    <link rel="stylesheet" href="style/estilo.css">
    <script type="text/javascript" src="Javascript/javascriptHandgame.js"></script>
</head>
<body>
    <div class="page">
        <nav id="navbar" class="navbar">
            <div class="logo">
                <a href="home.html">
                    <img class="centered-image" src="media/arcade/logo.png" alt="Logo HANDgame">
                </a>
                <h1>HANDgame</h1>
            </div>
        </nav>

        <section class="panel info-block">
            <h2>Piedra Papel Tijera Lagarto Spock</h2>
            <p>Selecciona una opcion para jugar contra la IA.</p>
            <ul>
                <li>Tijera corta Papel.</li>
                <li>Papel tapa Piedra.</li>
                <li>Piedra aplasta Lagarto.</li>
                <li>Lagarto envenena Spock.</li>
                <li>Spock rompe Tijera.</li>
            </ul>
        </section>

        <section class="panel">
            <div class="actions">
                <button class="choice-button" style="background-image: url('media/duelo pptls/piedra.png');" type="button" value="piedra" onclick="piedra2(value)" aria-label="Elegir Piedra"></button>
                <button class="choice-button" style="background-image: url('media/duelo pptls/logos/papel 2.png');" type="button" value="papel" onclick="piedra2(value)" aria-label="Elegir Papel"></button>
                <button class="choice-button" style="background-image: url('media/duelo pptls/logos/tijera.png');" type="button" value="tijera" onclick="piedra2(value)" aria-label="Elegir Tijera"></button>
                <button class="choice-button" style="background-image: url('media/duelo pptls/logos/lagarto.png');" type="button" value="lagarto" onclick="piedra2(value)" aria-label="Elegir Lagarto"></button>
                <button class="choice-button" style="background-image: url('media/duelo pptls/logos/spok.png');" type="button" value="spock" onclick="piedra2(value)" aria-label="Elegir Spock"></button>
            </div>
        </section>

        <div class="home-cta">
            <a class="home-button" href="home.html">Volver al home</a>
        </div>
    </div>
</body>
</html>
